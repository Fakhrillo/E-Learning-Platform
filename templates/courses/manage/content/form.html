{% extends "base.html" %}

{% block title %}
    {% if object %}Edit "{{ object.title }}" {% else %}Create{% endif %} content
{% endblock %}

{% block content %}
    <h1>
        {% if object %}Edit "{{ object.title }}" {% else %}Create{% endif %} content
    </h1>
    <div class="module form-card">
        <h2>Content Info</h2>
        <form action="" method="post" enctype="multipart/form-data" class="form">
            {% csrf_token %}
            {{ form.as_p }}
            <p><input type="submit" value="Save" class="button"></p>
        </form>
    </div>
{% endblock %}
