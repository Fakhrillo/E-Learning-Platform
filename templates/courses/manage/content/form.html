{% extends "base.html" %}

{% block title %}
    {%if object %}Edit "{{ object.title}}" {% else %}Create{% endif %} content
{% endblock %}

{% block content %}
    <h1>
        {%if object %}Edit "{{ object.title}}" {% else %}Create{% endif %} content
    </h1>
    <div class="module">
        <h2>Content Info</h2>
        <form action="" method="post" enctype="multipart/form-data">
            {{ form.as_p }}
            {% csrf_token %}
            <p><input type="submit" value="Save"></p>
        </form>
    </div>
{% endblock %}
