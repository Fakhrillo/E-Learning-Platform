{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{% block title %}Educa{% endblock %}</title>
        <link href="{% static "css/base.css" %}?v=20260312" rel="stylesheet">
    </head>
    <body>
        <header id="header">
            <div class="header-inner">
                <a href="/" class="logo">Educa</a>
                <nav class="nav">
                    <ul class="menu">
                        {% if request.user.is_authenticated %}
                            <li>
                                <form action="{% url "logout" %}" method="post">
                                    {% csrf_token %}
                                    <button type="submit" class="button ghost">Sign out</button>
                                </form>
                            </li>
                        {% else %}
                            <li><a href="{% url "login" %}" class="button ghost">Sign in</a></li>
                        {% endif %}
                    </ul>
                </nav>
            </div>
        </header>
        <main id="content">
            {% block content %}
            {% endblock %}
        </main>
        {% block include_js %}
        {% endblock %}
        <script>
            document.addEventListener('DOMContentLoaded', (event) => {
                // DOM loaded
                {% block domready %}
                {% endblock %}
            })
        </script>
    </body>
</html>
